<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Smart Locker</title>
    <link rel="icon" type="image/jpeg" href="logo_web.jpg?v=2">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .logo { width: 80px; height: 80px; border-radius: 12px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 25px; font-size: 1.5rem; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.3); }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #0056b3; }
        #error-msg { color: #dc3545; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="logo_web.jpg?v=2" alt="Logo" class="logo">
        <h2>Quản Trị Hệ Thống</h2>
        
        <div class="input-group">
            <label for="email">Tài khoản (Email)</label>
            <input type="email" id="email" placeholder="Nhập email...">
        </div>
        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>
        
        <button class="btn-login" onclick="login()">Đăng nhập</button>
        <p id="error-msg">Sai email hoặc mật khẩu!</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // VUI LÒNG ĐIỀN LẠI API KEY CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyDwvFJXeKPvGi1Wj1RJlm0Pe5UU-eAkVms",
            authDomain: "lockerxmakerspacexhcmute.firebaseapp.com",
            projectId: "lockerxmakerspacexhcmute",
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Đăng nhập thành công, chuyển hướng sang trang chủ
                window.location.href = "index.html";
            })
            .catch((error) => {
                // Thất bại
                errorMsg.style.display = "block";
            });
        };
    </script>
</body>
</html>
