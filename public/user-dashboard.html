<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tủ Của Tôi — Smart Locker</title>
<link rel="icon" type="image/jpeg" href="logo_web.jpg?v=2">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,sans-serif}
:root{
  --bg:#f4f7f6;--surface:#fff;--border:#ddd;--border2:#eee;
  --text:#333;--text2:#555;--text3:#888;
  --primary:#007bff;--primary-hover:#0056b3;
  --success:#28a745;--warning:#ffc107;--error:#dc3545;
  --chip-pending-bg:#fff3cd;--chip-pending-text:#856404;
  --chip-ok-bg:#d1f2e0;--chip-ok-text:#155724;
  --chip-face-bg:#cce5ff;--chip-face-text:#004085;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18191A;--surface:#242526;--border:#3E4042;--border2:#3E4042;
  --text:#E4E6EB;--text2:#B0B3B8;--text3:#888;
  --primary:#4D94FF;--primary-hover:#3378e0;
  --chip-pending-bg:#3d3000;--chip-pending-text:#ffd54f;
  --chip-ok-bg:#1b3a27;--chip-ok-text:#81c784;
  --chip-face-bg:#0d2440;--chip-face-text:#64b5f6;
}}
.ms{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;font-size:20px;line-height:1;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;vertical-align:middle}
.ms.filled{font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 24}

body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:30px 20px}

.container{width:100%;max-width:480px}

/* Header */
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.header img{width:48px;height:48px;border-radius:10px;object-fit:cover}
.header h1{font-size:1.3rem;color:var(--text)}
.header p{color:var(--text3);font-size:.85rem;margin-top:2px}

/* Lookup box */
.lookup-card{background:var(--surface);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.lookup-card h3{font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.input-row{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center; /* Center trên mobile */
}
.input-row input{
  flex:1;
  max-width:180px; /* Thu gọn input MSSV */
  padding:10px 14px;
.input-row input:focus{border-color:var(--primary)}}
@media(min-width:600px){
  .input-row{justify-content:flex-start} /* Desktop: align trái */
  .input-row input{max-width:none} /* Desktop: full width */
}
.btn-lookup{padding:10px 18px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap}
.btn-lookup:hover{background:var(--primary-hover)}
.not-found{color:var(--error);font-size:.88rem;margin-top:10px;display:none;align-items:center;gap:6px}
.not-found.show{display:flex}

/* Info card */
.info-card{background:var(--surface);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:16px;display:none}
.info-card.show{display:block}

.user-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border2)}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;flex-shrink:0}
.user-name{font-size:1.1rem;font-weight:700;color:var(--text)}
.user-mssv{font-size:.85rem;color:var(--text3);margin-top:2px}

.status-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{padding:5px 12px;border-radius:20px;font-size:.82rem;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.chip.pending{background:var(--chip-pending-bg);color:var(--chip-pending-text)}
.chip.approved{background:var(--chip-ok-bg);color:var(--chip-ok-text)}
.chip.face-yes{background:var(--chip-face-bg);color:var(--chip-face-text)}
.chip.face-no{background:var(--chip-pending-bg);color:var(--chip-pending-text)}

/* Locker section */
.section-title{font-size:.85rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

.locker-card{border:2px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:16px;transition:.2s}
.locker-card.occupied{border-color:var(--success);background:rgba(40,167,69,.06)}
.locker-card.no-locker{background:var(--bg);border-style:dashed}
.locker-icon{font-size:36px;color:var(--text3)}
.locker-icon.occupied{color:var(--success)}
.locker-info h4{font-size:1.05rem;font-weight:700;color:var(--text)}
.locker-info p{font-size:.85rem;color:var(--text3);margin-top:3px}
.locker-info .last-open{font-size:.8rem;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}

/* Log mini */
.log-list{margin-top:16px}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:.88rem;color:var(--text2)}
.log-item:last-child{border-bottom:none}
.log-icon{color:var(--primary);flex-shrink:0;margin-top:1px}
.log-time{font-size:.78rem;color:var(--text3);margin-top:2px}

.empty-log{text-align:center;color:var(--text3);padding:20px;font-size:.9rem}

/* Steps */
.steps{margin-top:8px}
.step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.step:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-num.done{background:var(--success)}
.step-text{font-size:.9rem;color:var(--text2);line-height:1.4;padding-top:3px}

.register-link{text-align:center;margin-top:20px;font-size:.9rem;color:var(--text3)}
.register-link a{color:var(--primary);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <img src="logo_web.jpg?v=2" alt="Logo">
    <div style="flex:1">
      <h1>Smart Locker</h1>
      <p>Tra cứu thông tin tủ của bạn</p>
    </div>
    <a href="landing.html" style="color:var(--primary);font-size:.85rem;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap"><span class="ms" style="font-size:18px">arrow_back</span> Trang chủ</a>
  </div>

  <!-- Lookup -->
  <div class="lookup-card">
    <h3><span class="ms">search</span> Nhập MSSV để tra cứu</h3>
    <div class="input-row">
      <input type="text" id="mssv-input" placeholder="VD: 22146436" maxlength="20"
        onkeydown="if(event.key==='Enter') lookup()">
      <button class="btn-lookup" onclick="lookup()">
        <span class="ms">search</span> Tra cứu
      </button>
    </div>
    <div class="not-found" id="not-found">
      <span class="ms">error_outline</span> Không tìm thấy MSSV này.
      <a href="register.html" style="color:var(--primary);font-weight:600;margin-left:4px">Đăng ký ngay</a>
    </div>
  </div>

  <!-- Info -->
  <div class="info-card" id="info-card">

    <!-- User -->
    <div class="user-row">
      <div class="avatar" id="avatar-letter">?</div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-mssv" id="user-mssv">—</div>
      </div>
    </div>

    <!-- Status chips -->
    <div class="status-chips" id="status-chips"></div>

    <!-- Locker -->
    <div class="section-title">Tủ được gán</div>
    <div class="locker-card" id="locker-card">
      <span class="ms locker-icon" id="locker-icon">lock_open</span>
      <div class="locker-info">
        <h4 id="locker-name">Chưa có tủ</h4>
        <p id="locker-size">—</p>
        <div class="last-open" id="last-open" style="display:none">
          <span class="ms" style="font-size:14px">schedule</span>
          <span id="last-open-time">—</span>
        </div>
      </div>
    </div>

    <!-- Log mini -->
    <div style="margin-top:20px">
      <div class="section-title">Lịch sử gần đây</div>
      <div class="log-list" id="log-list">
        <div class="empty-log">Đang tải...</div>
      </div>
    </div>

    <!-- Steps hướng dẫn -->
    <div style="margin-top:20px">
      <div class="section-title">Các bước tiếp theo</div>
      <div class="steps" id="steps"></div>
    </div>
  </div>

  <div class="register-link">Chưa có tài khoản? <a href="register.html">Đăng ký tại đây</a></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import{getDatabase,ref,get,query,orderByChild,equalTo,limitToLast}from"https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyDwvFJXeKPvGi1Wj1RJlm0Pe5UU-eAkVms",
  authDomain:"lockerxmakerspacexhcmute.firebaseapp.com",
  projectId:"lockerxmakerspacexhcmute",
  databaseURL:"https://lockerxmakerspacexhcmute-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const EVENT_LABEL={
  'OPEN_LOCKER'   :'Mở tủ',
  'ASSIGN_LOCKER' :'Gán tủ',
  'RELEASE_LOCKER':'Trả tủ'
};

// Auto-fill từ localStorage nếu vừa đăng ký
const savedMssv=localStorage.getItem('my_mssv');
if(savedMssv){
  document.getElementById('mssv-input').value=savedMssv;
  lookup();
}

async function lookup(){
  const mssv=document.getElementById('mssv-input').value.trim();
  if(!mssv) return;

  document.getElementById('not-found').classList.remove('show');
  document.getElementById('info-card').classList.remove('show');

  // Lấy user
  const userSnap=await get(ref(db,`users/${mssv}`));
  if(!userSnap.exists()){
    document.getElementById('not-found').classList.add('show');
    return;
  }
  const user=userSnap.val();

  // Avatar
  document.getElementById('avatar-letter').textContent=(user.name||'?')[0].toUpperCase();
  document.getElementById('user-name').textContent=user.name||'—';
  document.getElementById('user-mssv').textContent=`MSSV: ${mssv}`;

  // Chips
  const chips=document.getElementById('status-chips');
  const approved=String(user.is_approved)==='1';
  const hasFace=!!user.has_face;
  chips.innerHTML=`
    <span class="chip ${approved?'approved':'pending'}">
      <span class="ms" style="font-size:14px">${approved?'check_circle':'hourglass_empty'}</span>
      ${approved?'Đã được duyệt':'Chờ admin duyệt'}
    </span>
    <span class="chip ${hasFace?'face-yes':'face-no'}">
      <span class="ms" style="font-size:14px">${hasFace?'face':'face_retouching_off'}</span>
      ${hasFace?'Đã đăng ký khuôn mặt':'Chưa có khuôn mặt'}
    </span>`;

  // Locker
  const lockersSnap=await get(ref(db,'lockers'));
  let myLocker=null;
  let myLockerId=null;
  if(lockersSnap.exists()){
    const lockers=lockersSnap.val();
    for(const lid in lockers){
      if(lockers[lid].current_mssv===mssv){
        myLocker=lockers[lid];myLockerId=lid;break;
      }
    }
  }

  const lockerCard=document.getElementById('locker-card');
  const lockerIcon=document.getElementById('locker-icon');
  if(myLocker){
    lockerCard.classList.add('occupied');
    lockerIcon.classList.add('occupied');
    lockerIcon.textContent='lock';
    document.getElementById('locker-name').textContent=`Tủ ${myLockerId}`;
    document.getElementById('locker-size').textContent=myLocker.size==='small'?'Loại nhỏ':'Loại lớn';
    if(myLocker.last_open_time){
      document.getElementById('last-open').style.display='flex';
      document.getElementById('last-open-time').textContent='Mở lần cuối: '+myLocker.last_open_time;
    }
  } else {
    lockerCard.classList.remove('occupied');
    lockerIcon.classList.remove('occupied');
    lockerIcon.textContent='lock_open';
    document.getElementById('locker-name').textContent='Chưa được gán tủ';
    document.getElementById('locker-size').textContent='Liên hệ admin để được cấp tủ';
  }

  // Logs — chỉ đọc được nếu có auth, không block nếu lỗi
  const logList=document.getElementById('log-list');
  try{
    const logsSnap=await get(query(ref(db,'logs'),limitToLast(100)));
    logList.innerHTML='';
    let count=0;
    if(logsSnap.exists()){
      const allLogs=logsSnap.val();
      const myLogs=Object.values(allLogs)
        .filter(l=>l.mssv===mssv)
        .sort((a,b)=>b.time.localeCompare(a.time))
        .slice(0,5);
      if(myLogs.length){
        myLogs.forEach(l=>{
          count++;
          const ev=l.event||'';
          const icons={'OPEN_LOCKER':'lock_open','ASSIGN_LOCKER':'add_box','RELEASE_LOCKER':'lock'};
          logList.innerHTML+=`<div class="log-item">
            <span class="ms log-icon" style="font-size:18px">${icons[ev]||'info'}</span>
            <div>
              <div>${EVENT_LABEL[ev]||ev} — Tủ ${l.locker_id||'—'}</div>
              <div class="log-time">${l.time||'—'}</div>
            </div>
          </div>`;
        });
      }
    }
    if(!count) logList.innerHTML='<div class="empty-log">Chưa có lịch sử</div>';
  }catch(e){
    logList.innerHTML='<div class="empty-log">Không có quyền xem lịch sử</div>';
  }

  // Steps
  const stepsEl=document.getElementById('steps');
  const step1done=approved;
  const step2done=hasFace;
  const step3done=!!myLocker;
  stepsEl.innerHTML=`
    <div class="step">
      <div class="step-num ${step1done?'done':''}"><span class="ms filled" style="font-size:14px">${step1done?'check':'looks_one'}</span></div>
      <div class="step-text">${step1done?'✅ Admin đã duyệt tài khoản':'⏳ Chờ admin duyệt tài khoản của bạn'}</div>
    </div>
    <div class="step">
      <div class="step-num ${step2done?'done':''}"><span class="ms filled" style="font-size:14px">${step2done?'check':'looks_two'}</span></div>
      <div class="step-text">${step2done?'✅ Đã đăng ký khuôn mặt':'📸 Đến quầy để đăng ký khuôn mặt với nhân viên'}</div>
    </div>
    <div class="step">
      <div class="step-num ${step3done?'done':''}"><span class="ms filled" style="font-size:14px">${step3done?'check':'looks_3'}</span></div>
      <div class="step-text">${step3done?`✅ Đã được gán tủ ${myLockerId}`:'🗃️ Nhân viên sẽ gán tủ cho bạn sau khi hoàn thành bước 2'}</div>
    </div>`;

  document.getElementById('info-card').classList.add('show');
};
window.lookup=lookup;
</script>
</body>
</html>
